<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product</title>
    <script src="js/main.js" defer></script>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html" class="logo"
          ><img class="logo-img" src="images/logo.webp" />
          <img class="logo-text-img" src="images/logo-text.png" />
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li>
            <a href="cart.html">
              <span class="cart-icon-wrap">
                <img
                  class="cart-icon"
                  src="icons/cart.svg"
                  alt="Shopping Cart"
                />
                <span id="cart-counter" class="counter">0</span>
              </span>
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <section id="product-detail" class="product-detail">
      <div>
        <figure>
          <img id="product-image" class="product-img" src="" alt="" />
          <figcaption id="product-name"></figcaption>
        </figure>
      </div>
      <div>
        <button id="buy-btn" class="add-to-cart-btn">Add to cart</button>
      </div>
    </section>
  </body>
</html>
