<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/styles.css" />
    <title>Cart</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html" class="logo"
          ><img class="logo-img" src="images/logo.webp" />
          <img class="logo-text-img" src="images/logo-text.png" />
        </a>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li>
            <a href="cart.html">
              <span class="cart-icon-wrap">
                <img
                  class="cart-icon"
                  src="icons/cart.svg"
                  alt="Shopping Cart"
                />
                <span id="cart-counter" class="counter">0</span>
              </span>
            </a>
          </li>
        </ul>
      </nav>
    </header>
    <h1>Your Cart</h1>
    <ul id="cart-list"></ul>
    <script src="js/main.js"></script>
    <script>
      function renderCart() {
        const cart = getCart();
        const list = document.getElementById("cart-list");
        if (cart.length === 0) {
          list.innerHTML = "<li>Your cart is empty.</li>";
          return;
        }
        list.innerHTML = cart
          .map((id, index) =>
            PRODUCTS[id]
              ? `<li>${PRODUCTS[id].name} <button type="button" data-cart-index="${index}">Remove</button></li>`
              : "",
          )
          .join("");
        list.querySelectorAll("[data-cart-index]").forEach((btn) => {
          btn.addEventListener("click", () => {
            removeFromCartByIndex(Number(btn.getAttribute("data-cart-index")));
            renderCart();
            updateCartCounter();
          });
        });
      }
      renderCart();
    </script>
  </body>
</html>
