<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/styles.css" />
    <title>Cart</title>
  </head>
  <body>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="pages/products.html">Products</a></li>
        <li>
          <a href="cart.html"
            ><img class="cart-icon" src="icons/cart.svg" alt="Shopping Cart"
          /></a>
        </li>
      </ul>
    </nav>
    <h1>Your Cart</h1>
    <ul id="cart-list"></ul>
    <script>
      // Same product data as in product.html
      const products = {
        1: { name: "Product 1", price: "$10" },
        2: { name: "Product 2", price: "$20" },
        3: { name: "Product 3", price: "$30" },
        4: { name: "Product 4", price: "$40" },
        5: { name: "Product 5", price: "$50" },
        6: { name: "Product 6", price: "$60" },
        7: { name: "Product 7", price: "$70" },
        8: { name: "Product 8", price: "$80" },
        9: { name: "Product 9", price: "$90" },
      };
      function getCart() {
        return JSON.parse(localStorage.getItem("cart") || "[]");
      }
      function setCart(cart) {
        localStorage.setItem("cart", JSON.stringify(cart));
      }
      function removeFromCart(productId) {
        let cart = getCart();
        cart = cart.filter((id) => id !== productId);
        setCart(cart);
        renderCart();
      }
      function renderCart() {
        const cart = getCart();
        const list = document.getElementById("cart-list");
        if (cart.length === 0) {
          list.innerHTML = "<li>Your cart is empty.</li>";
          return;
        }
        list.innerHTML = cart
          .map((id) =>
            products[id]
              ? `<li>${products[id].name} - ${products[id].price} <button onclick="removeFromCart('${id}')">Remove</button></li>`
              : "",
          )
          .join("");
      }
      renderCart();
    </script>
  </body>
</html>
